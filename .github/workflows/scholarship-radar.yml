name: Scholarship Radar Pro

on:
  workflow_dispatch:
    inputs:
      write_firestore:
        description: "Write safe auto-checked records to Firestore"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: write

concurrency:
  group: scholarship-radar-pro
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install radar dependencies
        run: npm install --no-audit --no-fund

      - name: Run auto checker and automatic Firestore adder
        run: |
          if [ "${RADAR_WRITE_FIRESTORE}" = "true" ]; then
            node tools/scholarship-radar.mjs --write-firestore
          else
            node tools/scholarship-radar.mjs
          fi
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          RADAR_WRITE_FIRESTORE: ${{ github.event.inputs.write_firestore || 'true' }}
          RADAR_MAX_LINKS_PER_SOURCE: "18"
          RADAR_MAX_DETAIL_PAGES_PER_SOURCE: "8"

      - name: Commit radar reports safely
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/discovery-candidates.json data/radar-report.json package-lock.json
          if git diff --cached --quiet; then
            echo "No radar report changes to commit."
            exit 0
          fi
          git commit -m "Update scholarship radar reports"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
