name: Bulk Scholarship Auto Import

on:
  workflow_dispatch:
    inputs:
      source_pack:
        description: "Which scholarship source pack to discover/import"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "national"
          - "engineering"
          - "ap_tel"
          - "categories"
          - "private_trusted"
          - "girls"
      max_import:
        description: "Maximum records to import"
        required: false
        default: "100"
      dry_run:
        description: "Run without writing to Firestore"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      import_mode:
        description: "Engine mode: public JSON always works without secrets; Firestore is optional"
        required: false
        default: "auto_active"
        type: choice
        options:
          - "auto_active"
          - "safe_draft"
          - "review_only"
      auto_publish_threshold:
        description: "Minimum AI confidence required for public active records"
        required: false
        default: "85"
  schedule:
    - cron: "45 2 * * *"

permissions:
  contents: write

concurrency:
  group: scholarship-bulk-auto-import
  cancel-in-progress: false

jobs:
  secretless-scholarship-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Discover scholarship sources by pack
        env:
          SOURCE_PACK: ${{ inputs.source_pack || 'all' }}
        run: node scripts/auto-discover-scholarships-v2.mjs

      - name: Build public scholarship JSON database
        env:
          SOURCE_PACK: ${{ inputs.source_pack || 'all' }}
          MAX_IMPORT: ${{ inputs.max_import || '100' }}
          AUTO_PUBLISH_THRESHOLD: ${{ inputs.auto_publish_threshold || '85' }}
        run: node scripts/build-public-scholarship-feed-v2.mjs

      - name: Optional Firestore import when Firebase secret exists
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          SOURCE_PACK: ${{ inputs.source_pack || 'all' }}
          MAX_IMPORT: ${{ inputs.max_import || '100' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          IMPORT_MODE: ${{ inputs.import_mode || 'auto_active' }}
          AUTO_PUBLISH_THRESHOLD: ${{ inputs.auto_publish_threshold || '85' }}
          FIRESTORE_COLLECTION: scholarships
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run requested. Public JSON already generated; running Firestore preview without secrets if possible."
            node scripts/bulk-import-discovered-scholarships-v2.mjs || true
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Firebase secret found. Running optional Firestore import."
            node scripts/bulk-import-discovered-scholarships-v2.mjs
          else
            echo "No Firebase secret found. Skipping Firestore import. Secretless public JSON engine is complete."
          fi

      - name: Optional Firestore tracker when Firebase secret exists
        if: ${{ (inputs.dry_run || 'false') == 'false' }}
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          AUTO_PROMOTE_DRAFTS: "true"
          AUTO_PUBLISH_THRESHOLD: ${{ inputs.auto_publish_threshold || '85' }}
          FIRESTORE_COLLECTION: scholarships
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Firebase secret found. Running optional Firestore tracker."
            node scripts/auto-track-scholarships-v2.mjs
          else
            echo "No Firebase secret found. Skipping Firestore tracker. Public JSON remains the active automated engine."
          fi

      - name: Commit public engine reports
        if: always()
        run: |
          git config user.name "applymate-secretless-scholarship-bot"
          git config user.email "applymate-secretless-scholarship-bot@users.noreply.github.com"
          git add data/auto-discovered-scholarships.json data/auto-discovered-scholarships.legacy.txt data/public-scholarships.json data/bulk-import-report.json data/scholarship-ai-tracker-report.json || true
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update secretless scholarship engine data"
            git push
          fi
