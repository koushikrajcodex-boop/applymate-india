name: Static checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r -d '' file; do
            echo "Checking ${file}"
            node --check "${file}"
          done < <(
            find . \
              -maxdepth 1 \
              -type f \
              -name '*.js' \
              -print0
          )

      - name: Check required files
        shell: bash
        run: |
          set -euo pipefail

          test -f index.html
          test -f login.html
          test -f dashboard.html
          test -f firebase-config.js
          test -f firestore.rules
          test -f firebase.json

      - name: Reject unfinished placeholders
        shell: bash
        run: |
          set -euo pipefail

          if grep \
            -R \
            --line-number \
            --include='*.js' \
            'PASTE_YOUR_' \
            .; then
            echo "Unfinished placeholder found."
            exit 1
          fi
