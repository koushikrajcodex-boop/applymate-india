name: Scholarship Auto Discovery

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scholarship discovery
        run: node scripts/auto-discover-scholarships.mjs

      - name: Commit discovery results
        run: |
          git config user.name "applymate-discovery-bot"
          git config user.email "applymate-discovery-bot@users.noreply.github.com"
          git add data/auto-discovered-scholarships.json data/auto-discovered-scholarships.legacy.txt
          if git diff --cached --quiet; then
            echo "No discovery changes to commit."
          else
            git commit -m "Update auto-discovered scholarship feed"
            git push
          fi
