name: Integrity Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  integrity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            node --check "$file"
          done < <(find . -type f \( -name '*.js' -o -name '*.mjs' \) -not -path './.git/*' -print0)

      - name: Check inline JavaScript syntax
        run: node scripts/check-inline-scripts.mjs

      - name: Check database rules regressions
        run: node tests/firestore-rules-regression.mjs

      - name: Run repository integrity check
        run: node scripts/check-integrity.mjs
