name: Integrity Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  integrity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run repository integrity check
        run: node scripts/check-integrity.mjs
